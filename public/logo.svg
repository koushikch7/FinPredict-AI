<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FinPredict-AI logo">
  <title>FinPredict-AI</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="bull" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square base -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- subtle grid (chart paper) -->
  <g stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1">
    <path d="M64 128H448M64 192H448M64 256H448M64 320H448M64 384H448"/>
    <path d="M128 64V448M192 64V448M256 64V448M320 64V448M384 64V448"/>
  </g>

  <!-- bullish candlesticks (rising bars) -->
  <g>
    <rect x="96"  y="320" width="36" height="56" rx="6" fill="#10B981" opacity="0.55"/>
    <rect x="156" y="276" width="36" height="100" rx="6" fill="#10B981" opacity="0.7"/>
    <rect x="216" y="232" width="36" height="144" rx="6" fill="#10B981" opacity="0.85"/>
    <rect x="276" y="184" width="36" height="192" rx="6" fill="url(#bull)"/>
    <rect x="336" y="140" width="36" height="236" rx="6" fill="url(#bull)"/>
  </g>

  <!-- upward trend line -->
  <polyline
    points="96,310 174,280 234,236 294,188 354,144 410,108"
    fill="none"
    stroke="url(#bull)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- arrow head at top-right of trendline -->
  <path d="M388 96 L420 96 L420 128" fill="none" stroke="url(#bull)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI sparkle (4-point star) -->
  <g transform="translate(126 132)">
    <path d="M0 -36 L8 -8 L36 0 L8 8 L0 36 L-8 8 L-36 0 L-8 -8 Z" fill="url(#spark)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
  </g>

  <!-- small secondary sparkles -->
  <g fill="url(#spark)" opacity="0.85">
    <path d="M76 80 L80 70 L84 80 L94 84 L84 88 L80 98 L76 88 L66 84 Z"/>
    <path d="M196 92 L198 86 L200 92 L206 94 L200 96 L198 102 L196 96 L190 94 Z"/>
  </g>
</svg>
